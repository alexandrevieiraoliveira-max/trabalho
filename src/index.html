<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Trabalho</title>
</head>

<style>
    body {
        font-family:Arial, Helvetica, sans-serif;
        background-color: rgb(239, 239, 219);
    }

    main {
        text-align: center;
    }

    main h1 {
        font-size: 30px;
    }

    main p {
        margin-top: 10px;
    }

    section {
        margin-top: 100px;
        margin-left: 200px;
    }

    section h1 {
        font-size: 20px;
        
    }

    section h2 {
        color:rgb(239, 38, 38) ;
    }
</style>

<body>
    <main>
        <h1>Salveee guriza</h1>
        <p>Site feito para um trabalho passado pela professora!</p>
    </main>

    <section>
        <div>
            <h1>Função de somar números</h1>
            <input type="number" id="n1" placeholder="Digite o número um" />
            <input type="number" id="n2" placeholder="Digite o número um" />

            <h2 id="result"></h2>

            <button onclick="methodCalc()">Clique aqui</button>
        </div>
    </section>

    <script>
        function methodCalc() {
            const n1 = parseFloat(document.getElementById('n1').value);
            const n2 = parseFloat(document.getElementById('n2').value);
            
            const sum = n1 + n2;
            
            document.getElementById('result').innerText = `Igual a: ${sum}`;

        }
        
    </script>
</body>
</html>
